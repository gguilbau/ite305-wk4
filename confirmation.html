<h1>Private Lesson Request Confirmation</h1>
Name: <div id="confirmName"></div><br>
Email: <div id="confirmEmail"></div><br>
Phone: <div id="confirmPhone"></div><br>
Category: <div id="confirmCategory"></div><br>
Description: <p id="confirmDescription"></p><br>

<form class="confirm-form">
    <label for="confirmAccuracy">I have reviewed all my information for accuracy.</label>
    <input type="checkbox" id="confirmAccuracy" class="form-control">
    <button class="form-control" id="confirmRequest">Submit</button>    
</form>

<script>
    $("#confirmRequest").on("click", function(e)
    {
        // Stop the submit from reloading page
        e.preventDefault();
        
        // Check if user verified accuracy..
        if ($('#confirmAccuracy').is(':checked')) {            
            // Load using jquery and flush input to new page
            $("#bodyContent").load("success.html", function() {
                $("#successMessage").text(`Thank you, ${userData.name}! You will receive a reply at ${userData.email} within 24 hours.`);
            });

        }

        // Display success page..
        else {
            alert("You must confirm your information is accurate to submit a request.");
        }
    });
</script>
